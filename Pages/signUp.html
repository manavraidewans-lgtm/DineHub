<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineHub | Let's create a account for tasty and Fresh Meals</title>
    <link rel="icon" href="Assets/Logo/Logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Business/mail-line.svg">
    <link rel="stylesheet" href="../StyleSheets/signUp.css">
</head>
<body>

    <div class="outline">

        <div class="login-outline">

            <div class="header">
                <h3>Create Account</h3>
                <p>Join Dinehub now</p>
            </div>
            
            <form action="">

                <div class="name">
                    <input type="text" placeholder="Enter your full name" name="name">
                </div>


                <div class="email">
                    <input type="email" placeholder="Enter your email Id" name="email">
                </div>


                <div class="pass">
                    <input type="password" placeholder="Enter Password" name="password">
                </div>


                <div class="confirm">
                    <input type="text" placeholder="Confirm Password" name="confirm">
                </div>


                <div class="but">
                    <button>Sign Up</button>
                </div>


                <div class="login">
                    <p>Already have an account?</p> <span><a href="../index.html">Login</a></span>
                </div>

            </form>

            

            
           

        </div>

    </div>
    
</body>
</html>
