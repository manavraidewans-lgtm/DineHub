<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineHub | Where every flavor tells a story</title>
    <link rel="icon" href="Assets/Logo/Logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Responsive/index-responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css">
</head>
<body>
    <!-- ================= Splash Screen ================= -->

<div id="splash-screen">
    <div class="splash-content">

        <img src="Assets/Logo/Logo.png" alt="DineHub Logo">

        

        <p>Good Food, Come's With Great Mood</p>

        <div class="loader"></div>

    </div>
</div>

    <div class="outline">

        <div class="login-outline">

            <div class="header">
                <h3>Welcome Back!</h3>
                <p>Login to continue</p>
            </div>


            <form action="">

                <div class="email">
                    <input type="email" id="email" name="email" placeholder="E-mail Or Phone">
                </div>

                <div class="pass">
                    <input type="password" id="pass" name="password" placeholder="Password">
                </div>

                <div class="two-option">

                    <div class="remember">
                        <input type="checkbox" id="rem" name="remember">
                        <label for="rem">Remember Me</label>
                    </div>


                    <div class="forgot">
                        <a href="Pages/forgot-pass.html">Forgot password?</a>
                    </div>

                </div>


                <div class="but">
                    <button><a href="Pages/home.html">Login</a></button>
                </div>


                <div class="sign">
                    <p>Don't have an account? <a href="Pages/signUp.html">Sign Up</a></p>
                </div>

            </form>



        </div>

    </div>

</body>

<script>
    window.addEventListener("load", () => {

    const splash = document.getElementById("splash-screen");

    setTimeout(() => {

        splash.classList.add("hide");

    }, 1200);

});
</script>

</html>
