<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineHub | Where every flavor tells a story</title>
    <link rel="icon" href="Assets/Logo/Logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Business/mail-line.svg">
</head>
<body>

    <div class="outline">

        <div class="login-outline">

            <div class="header">
                <h3>Welcome Back!</h3>
                <p>Login to continue</p>
            </div>


            <div class="form">

                <div class="input">
                    <input type="email" name="email" placeholder="Email or Phone">
                    <input type="password" name="pass"
                    placeholder="Enter your password">
                </div>


                 <div class="form-bottom">
                    <input type="checkbox" name="remember" value="rem" id="remember">
                    <label for="remember">Remember Me</label>
                    <a href="Pages/forgot-pass.html">Forgot Password?</a>
                 </div>

                 <div class="but">
                    <a href="Pages/home.html"><button>Login</button></a>
                 </div>

                <div class="signup">
                    <span>Don't have an account</span>
                    <span><a href="Pages/signUp.html">Sign-up</a></span>
                </div>

            </div>

           

        </div>

    </div>
    
</body>
</html>
